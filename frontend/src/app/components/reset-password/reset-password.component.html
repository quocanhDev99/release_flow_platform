<div class="login-page">
  <!-- Background decoration -->
  <div class="login-page__bg">
    <div class="login-page__orb login-page__orb--1"></div>
    <div class="login-page__orb login-page__orb--2"></div>
    <div class="login-page__orb login-page__orb--3"></div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <!-- Logo / Brand -->
    <div class="login-card__brand">
      <span class="login-card__brand-icon">🔑</span>
      <div>
        <h1 class="login-card__title">Reset Password</h1>
        <p class="login-card__subtitle">Enter your new secure password below</p>
      </div>
    </div>

    <div class="login-card__form" style="margin-top: 10px;">
      @if (token) {
        <mat-form-field appearance="outline" class="login-card__field">
          <mat-label>New Password</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input id="reset-password-input" matInput
                 [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 placeholder="Min. 6 characters"
                 (keyup.enter)="onReset()"
                 [disabled]="loading()">
          <button mat-icon-button matSuffix type="button"
                  (click)="showPassword = !showPassword"
                  [disabled]="loading()">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline" class="login-card__field">
          <mat-label>Confirm Password</mat-label>
          <mat-icon matPrefix>lock_reset</mat-icon>
          <input id="reset-confirm-input" matInput
                 [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="confirmPassword"
                 placeholder="Repeat password"
                 (keyup.enter)="onReset()"
                 [disabled]="loading()">
        </mat-form-field>

        @if (error()) {
          <div class="login-card__error">
            <mat-icon>error_outline</mat-icon>
            {{ error() }}
          </div>
        }
        @if (success()) {
          <div class="login-card__success">
            <mat-icon>check_circle_outline</mat-icon>
            {{ success() }}
          </div>
        }

        <button id="reset-submit-btn"
                mat-flat-button
                class="login-card__submit"
                (click)="onReset()"
                [disabled]="loading() || success() !== ''">
          @if (loading()) {
            <mat-spinner diameter="20" class="login-card__spinner"></mat-spinner>
          } @else {
            <ng-container matButtonIcon>
              <mat-icon>published_with_changes</mat-icon>
              <span>Reset Password</span>
            </ng-container>
          }
        </button>
      } @else {
        <div class="login-card__error" style="margin-bottom: 16px;">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error() }}</span>
        </div>
      }

      <div class="login-card__back-link-wrapper">
        <a href="/login" class="login-card__back-link">Back to Sign In</a>
      </div>
    </div>
  </div>
</div>
