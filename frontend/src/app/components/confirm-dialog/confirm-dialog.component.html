<div class="confirm-dialog" [class.confirm-dialog--danger]="data.type === 'danger'" [class.confirm-dialog--warn]="data.type === 'warn'">
  <div class="confirm-dialog__icon-wrap">
    <mat-icon class="confirm-dialog__icon">{{ iconName }}</mat-icon>
  </div>

  <div class="confirm-dialog__body">
    <h3 class="confirm-dialog__title">{{ data.title }}</h3>
    <p class="confirm-dialog__message">{{ data.message }}</p>
  </div>

  <div class="confirm-dialog__actions">
    <button mat-stroked-button (click)="cancel()">
      {{ data.cancelLabel || 'Cancel' }}
    </button>
    <button
      mat-raised-button
      [color]="data.type === 'danger' ? 'warn' : 'primary'"
      (click)="confirm()"
    >
      {{ data.confirmLabel || 'Confirm' }}
    </button>
  </div>
</div>
